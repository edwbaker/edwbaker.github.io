---
layout: default
---

<h1>Posts tagged "{{ page.tag }}"</h1>

<ul>
{% assign sorted_posts = page.posts | sort: "date" | reverse %}
{% for post in sorted_posts %}
  <li>
    <a href="{{ post.url }}">{{ post.title }}</a>
    <small>({{ post.date | date: "%Y-%m-%d" }})</small>
  </li>
{% endfor %}
</ul>

<p><a href="/tags">← All tags</a></p>
