---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>
  
  <p class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
  </p>

  {{ content }}

  {% if page.tags.size > 0 %}
  <p class="post-tags">
    Tags: 
    {% for tag in page.tags %}
      <a href="/tags/{{ tag | slugify }}/">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
    {% endfor %}
  </p>
  {% endif %}
</article>
